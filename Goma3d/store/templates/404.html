{% extends 'base.html' %}
{% block title %}Página no encontrada — Gflex3D{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;">
  <div style="font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 40px rgba(255,92,0,.4));">⚙️</div>
  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,10vw,120px);line-height:1;color:var(--white);">404</h1>
  <p style="font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,3vw,32px);color:var(--orange);letter-spacing:2px;margin-bottom:12px;">PIEZA NO ENCONTRADA</p>
  <p style="color:var(--gray);font-size:15px;max-width:400px;margin-bottom:36px;line-height:1.6;">Esta URL no existe o fue movida. Puede que la pieza que buscas esté en nuestro catálogo.</p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <a href="{% url 'catalog' %}" class="btn-primary" style="padding:13px 28px;">Ver catálogo</a>
    <a href="{% url 'home' %}" class="btn-outline" style="padding:13px 28px;">Ir al inicio</a>
  </div>
</div>
{% endblock %}
