{% extends "admin/change_list.html" %}
{% block object-tools-items %}
  <li>
    <a href="{% url 'admin:product_download_template' %}"
       class="addlink"
       style="background:#1e7e34;color:#fff;padding:8px 14px;border-radius:6px;
              text-decoration:none;font-size:13px;font-weight:600;display:inline-flex;
              align-items:center;gap:6px;">
      📥 Descargar plantilla Excel
    </a>
  </li>
  <li>
    <label for="excelFileInput"
           style="background:#155a8a;color:#fff;padding:8px 14px;border-radius:6px;
                  font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;
                  align-items:center;gap:6px;">
      📤 Importar desde Excel
    </label>
    <form id="excelImportForm"
          method="post"
          action="{% url 'admin:product_import_excel' %}"
          enctype="multipart/form-data"
          style="display:inline;">
      {% csrf_token %}
      <input type="file"
             id="excelFileInput"
             name="excel_file"
             accept=".xlsx,.xls"
             style="display:none;"
             onchange="document.getElementById('excelImportForm').submit();">
    </form>
  </li>
  {{ block.super }}
{% endblock %}
