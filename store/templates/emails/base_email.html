<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{margin:0;padding:0;background:#f4f4f5;font-family:'Helvetica Neue',Arial,sans-serif;color:#1a1a1a;}
  .wrapper{max-width:600px;margin:0 auto;padding:32px 16px;}
  .card{background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
  .header{background:#0a0a0b;padding:28px 32px;text-align:center;}
  .logo{font-size:28px;font-weight:900;letter-spacing:4px;color:#f5f3ef;}
  .logo span{color:#ff5c00;}
  .header-sub{color:#8a8f9a;font-size:13px;margin-top:6px;letter-spacing:1px;}
  .body{padding:32px;}
  .greeting{font-size:20px;font-weight:700;margin-bottom:8px;color:#0a0a0b;}
  .intro{font-size:15px;color:#555;line-height:1.6;margin-bottom:28px;}
  .section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ff5c00;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #fff3ed;}
  .order-box{background:#f9f9fa;border-radius:8px;overflow:hidden;margin-bottom:24px;}
  .order-row{display:flex;justify-content:space-between;padding:12px 16px;font-size:14px;border-bottom:1px solid #efefef;}
  .order-row:last-child{border-bottom:none;}
  .order-row .label{color:#888;}
  .order-row .value{font-weight:600;text-align:right;max-width:320px;}
  .total-row{background:#0a0a0b;padding:16px;display:flex;justify-content:space-between;align-items:center;border-radius:8px;margin-bottom:24px;}
  .total-label{color:#8a8f9a;font-size:13px;text-transform:uppercase;letter-spacing:1px;}
  .total-value{color:#ff5c00;font-size:24px;font-weight:900;}
  .bank-box{background:#fff8f5;border:2px solid #ffe0cc;border-radius:8px;padding:20px;margin-bottom:24px;}
  .bank-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #ffe0cc;}
  .bank-row:last-child{border-bottom:none;}
  .bank-row .bl{color:#888;}
  .bank-row .bv{font-weight:700;font-family:monospace;color:#0a0a0b;}
  .step-box{margin-bottom:24px;}
  .step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}
  .step-num{min-width:28px;height:28px;background:#ff5c00;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .step-text{font-size:14px;color:#444;line-height:1.5;}
  .wa-box{background:#e8faf0;border:1px solid #b7ebd0;border-radius:8px;padding:16px 20px;display:flex;gap:12px;align-items:center;margin-bottom:24px;}
  .wa-icon{font-size:32px;flex-shrink:0;}
  .wa-text{font-size:13px;color:#1a6b40;line-height:1.5;}
  .wa-text a{color:#1a6b40;font-weight:700;}
  .divider{height:1px;background:#efefef;margin:24px 0;}
  .footer{background:#f9f9fa;padding:20px 32px;text-align:center;border-top:1px solid #efefef;}
  .footer p{font-size:12px;color:#aaa;margin:4px 0;line-height:1.6;}
  .footer a{color:#ff5c00;text-decoration:none;}
  .tag{display:inline-block;background:#fff3ed;color:#ff5c00;border:1px solid #ffe0cc;border-radius:20px;padding:4px 14px;font-size:13px;font-weight:700;letter-spacing:.5px;font-family:monospace;margin-bottom:16px;}
  .items-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
  .items-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#aaa;padding:8px 0;border-bottom:2px solid #efefef;}
  .items-table td{padding:12px 0;border-bottom:1px solid #f0f0f0;font-size:14px;vertical-align:top;}
  .items-table .price{text-align:right;font-weight:700;}
  .alert-box{background:#fffbf0;border:1px solid #fde68a;border-radius:8px;padding:14px 16px;margin-bottom:20px;font-size:14px;color:#92400e;line-height:1.5;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header">
      <div class="logo">GFLEX<span>3D</span></div>
      <div class="header-sub">{% block header_sub %}Repuestos en Poliuretano y Caucho{% endblock %}</div>
    </div>
    <div class="body">{% block body %}{% endblock %}</div>
    <div class="footer">
      <p>© 2025 {{ store_name }} · Fabricado en Chile 🇨🇱</p>
      <p>📧 <a href="mailto:{{ store_email }}">{{ store_email }}</a> &nbsp;·&nbsp; 💬 <a href="https://wa.me/{{ whatsapp_number }}">WhatsApp</a></p>
      <p style="margin-top:8px;font-size:11px;color:#ccc;">Email generado automáticamente. No responder directamente a este mensaje.</p>
    </div>
  </div>
</div>
</body>
</html>
